# =============================================================================
# Workflow 5: delete-merged-branch
# Triggered by: PR merged into main
# What it does: Deletes the feature/bugfix branch after merge
# =============================================================================
name: 5 · Delete Merged Branch

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Delete merged branch
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          REPO="${{ github.repository }}"

          # Only delete feature/* or bugfix/* branches
          if [[ "$BRANCH" == feature/* || "$BRANCH" == bugfix/* ]]; then
            curl -sf -X DELETE \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/git/refs/heads/${BRANCH}"
            echo "Deleted branch: $BRANCH"
          else
            echo "Skipped deletion — branch '$BRANCH' is not a feature or bugfix branch"
          fi
