# =============================================================================
# Workflow 3: generate-code
# Triggered by: design-review-handler via repository_dispatch (after approval)
# What it does: Reads design doc + copilot-instructions + key source files,
#               calls Claude Opus 4.7 to generate Spring Boot code,
#               commits to branch, opens a code review PR.
# =============================================================================
name: 3 · Generate Code

on:
  repository_dispatch:
    types: [generate-code]

jobs:
  generate-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    env:
      TICKET_ID:   ${{ github.event.client_payload.ticket_id }}
      BRANCH_NAME: ${{ github.event.client_payload.branch_name }}
      PR_NUMBER:   ${{ github.event.client_payload.pr_number }}

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Collect context files
        id: collect_context
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TICKET_ID="${{ env.TICKET_ID }}"
          REPO="${{ github.repository }}"
          BRANCH="${{ env.BRANCH_NAME }}"

          # Design doc — try filesystem, then API, then fall back to requirement file
          DESIGN_DOC=""
          if [ -f "docs/design/${TICKET_ID}.md" ]; then
            DESIGN_DOC=$(cat "docs/design/${TICKET_ID}.md")
          else
            echo "Design doc not on filesystem, fetching from GitHub API..."
            DESIGN_DOC=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.raw+json" \
              "https://api.github.com/repos/${REPO}/contents/docs/design/${TICKET_ID}.md?ref=${BRANCH}") || true
          fi

          # Last resort: use the requirement file as the design doc
          if [ -z "$DESIGN_DOC" ]; then
            echo "Design doc not found — using requirement file as fallback..."
            REQUIREMENT_FILE=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.raw+json" \
              "https://api.github.com/repos/${REPO}/contents/requirements/${TICKET_ID}.md?ref=${BRANCH}") || true
            if [ -n "$REQUIREMENT_FILE" ]; then
              DESIGN_DOC="$REQUIREMENT_FILE"
            elif [ -f "requirements/${TICKET_ID}.md" ]; then
              DESIGN_DOC=$(cat "requirements/${TICKET_ID}.md")
            fi
          fi

          if [ -z "$DESIGN_DOC" ]; then
            echo "ERROR: Neither design doc nor requirement file found for ${TICKET_ID}."
            exit 1
          fi

          echo "DESIGN_DOC<<HEREDOC" >> $GITHUB_ENV
          echo "$DESIGN_DOC"         >> $GITHUB_ENV
          echo "HEREDOC"             >> $GITHUB_ENV

          # Copilot instructions
          INSTRUCTIONS=""
          [ -f ".github/copilot-instructions.md" ] && INSTRUCTIONS=$(cat ".github/copilot-instructions.md")
          echo "INSTRUCTIONS<<HEREDOC" >> $GITHUB_ENV
          echo "$INSTRUCTIONS"         >> $GITHUB_ENV
          echo "HEREDOC"               >> $GITHUB_ENV

          # Collect ALL existing Java source files as context (byte-capped at 200KB)
          SOURCE_CONTEXT=""
          TOTAL_SIZE=0
          MAX_SIZE=200000
          while IFS= read -r f; do
            FSIZE=$(wc -c < "$f" 2>/dev/null || echo 0)
            TOTAL_SIZE=$((TOTAL_SIZE + FSIZE))
            if [ $TOTAL_SIZE -gt $MAX_SIZE ]; then
              echo "WARNING: source context truncated at ${MAX_SIZE} byte limit"
              break
            fi
            SOURCE_CONTEXT="${SOURCE_CONTEXT}\n\n### File: ${f}\n\`\`\`java\n$(cat "$f")\n\`\`\`"
          done < <(find . -name "*.java" -path "*/src/main/java/*" 2>/dev/null | sort)

          echo "SOURCE_CONTEXT<<HEREDOC" >> $GITHUB_ENV
          printf "%b" "$SOURCE_CONTEXT"  >> $GITHUB_ENV
          echo ""                        >> $GITHUB_ENV
          echo "HEREDOC"                 >> $GITHUB_ENV

          # Inventory of existing file paths — passed separately so the LLM knows what to modify vs create
          EXISTING_FILE_PATHS=$(find . -name "*.java" -path "*/src/main/java/*" 2>/dev/null | sed 's|^\./||' | sort)
          echo "EXISTING_FILE_PATHS<<HEREDOC" >> $GITHUB_ENV
          echo "$EXISTING_FILE_PATHS"         >> $GITHUB_ENV
          echo "HEREDOC"                      >> $GITHUB_ENV

          # pom.xml for dependency awareness
          POM_CONTENT=""
          [ -f "pom.xml" ] && POM_CONTENT=$(cat "pom.xml")
          echo "POM_CONTENT<<HEREDOC" >> $GITHUB_ENV
          echo "$POM_CONTENT"         >> $GITHUB_ENV
          echo "HEREDOC"              >> $GITHUB_ENV

          # Detect all module base paths (each directory containing src/main/java)
          MODULE_PATHS=""
          while IFS= read -r java_dir; do
            module=$(echo "$java_dir" | sed 's|^\./||' | sed 's|/src/main/java$||')
            MODULE_PATHS="${MODULE_PATHS}${module},"
          done < <(find . -type d -name "java" -path "*/src/main/java" 2>/dev/null)
          MODULE_PATHS="${MODULE_PATHS%,}"  # strip trailing comma
          echo "Detected MODULE_PATHS: $MODULE_PATHS"
          echo "MODULE_PATHS=$MODULE_PATHS" >> $GITHUB_ENV

      - name: Generate Spring Boot code via GitHub Models API
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_MODEL: ${{ vars.GH_MODEL || 'gpt-4o' }}
          EXISTING_FILE_PATHS: ${{ env.EXISTING_FILE_PATHS }}
        run: |
          python3 scripts/generate_code.py

      - name: Commit generated code
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "feat(${TICKET_ID}): AI-generated implementation

          Generated from approved design doc: docs/design/${TICKET_ID}.md
          Pipeline: auto-dev-pipeline
          
          Co-authored-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push origin "$BRANCH_NAME"

      - name: Close design PR and open code review PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Ensure code-review label exists
          gh label create "code-review" --color "#e4e669" --force || true

          # Comment on design PR that it's been approved and code is ready
          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" \
              --body "✅ Design approved. Code has been generated and a new PR is open for code review." || true
            gh pr close "$PR_NUMBER" || true
          fi

          # Collect generated file list for PR body
          GENERATED_FILES=""
          if [ -f /tmp/generated_files.txt ]; then
            GENERATED_FILES=$(cat /tmp/generated_files.txt | sed 's/^/- `/' | sed 's/$/`/')
          fi

          # Open code review PR
          CODE_PR_URL=$(gh pr create \
            --title "🚀 [Code Review] ${TICKET_ID}" \
            --body "## Code Review Required

          AI-generated Spring Boot implementation for **\`${TICKET_ID}\`**.

          📄 **Based on:** \`docs/design/${TICKET_ID}.md\`

          ### Generated Files
          ${GENERATED_FILES}

          ---

          ### 🔄 To request code changes:
          Comment \`/revise-code: <feedback>\` for targeted AI revision.

          ---
          > **This PR requires Copilot review + 1 human approval before merging.**" \
            --base main \
            --head "$BRANCH_NAME" \
            --label "code-review")

          echo "Code review PR opened: $CODE_PR_URL"

          # Extract PR number from URL and request Copilot review
          CODE_PR_NUMBER=$(echo "$CODE_PR_URL" | grep -oE '[0-9]+$')
          REPO="${{ github.repository }}"

          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pulls/${CODE_PR_NUMBER}/requested_reviewers" \
            -d '{"reviewers":["github-copilot"]}' > /dev/null || echo "Copilot review request skipped (may not be enabled on this repo)"