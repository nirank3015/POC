# =============================================================================
# Workflow 3: generate-code
# Triggered by: design-review-handler via repository_dispatch (after approval)
# What it does: Reads design doc + copilot-instructions + key source files,
#               calls Claude API to generate Spring Boot code,
#               commits to branch, opens a code review PR.
# =============================================================================
name: 3 · Generate Code

on:
  repository_dispatch:
    types: [generate-code]

jobs:
  generate-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    env:
      TICKET_ID:   ${{ github.event.client_payload.ticket_id }}
      BRANCH_NAME: ${{ github.event.client_payload.branch_name }}
      PR_NUMBER:   ${{ github.event.client_payload.pr_number }}

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Collect context files
        id: collect_context
        run: |
          TICKET_ID="${{ env.TICKET_ID }}"

          # Design doc (required)
          DESIGN_DOC=$(cat "docs/design/${TICKET_ID}.md")
          echo "DESIGN_DOC<<HEREDOC" >> $GITHUB_ENV
          echo "$DESIGN_DOC"         >> $GITHUB_ENV
          echo "HEREDOC"             >> $GITHUB_ENV

          # Copilot instructions
          INSTRUCTIONS=""
          [ -f ".github/copilot-instructions.md" ] && INSTRUCTIONS=$(cat ".github/copilot-instructions.md")
          echo "INSTRUCTIONS<<HEREDOC" >> $GITHUB_ENV
          echo "$INSTRUCTIONS"         >> $GITHUB_ENV
          echo "HEREDOC"               >> $GITHUB_ENV

          # Collect representative source files for context
          # Entities, Services, Repositories, Controllers (max 30 files to stay within token limits)
          SOURCE_CONTEXT=""
          for pattern in \
            "src/main/java/**/*Entity.java" \
            "src/main/java/**/*Repository.java" \
            "src/main/java/**/*Service.java" \
            "src/main/java/**/*ServiceImpl.java" \
            "src/main/java/**/*Controller.java" \
            "src/main/java/**/*Config.java" \
            "src/main/java/**/*Exception*.java"; do
            for f in $(find . -path "./$pattern" 2>/dev/null | head -5); do
              SOURCE_CONTEXT="${SOURCE_CONTEXT}\n\n### File: ${f}\n\`\`\`java\n$(cat "$f")\n\`\`\`"
            done
          done

          echo "SOURCE_CONTEXT<<HEREDOC" >> $GITHUB_ENV
          printf "%b" "$SOURCE_CONTEXT"  >> $GITHUB_ENV
          echo ""                        >> $GITHUB_ENV
          echo "HEREDOC"                 >> $GITHUB_ENV

          # pom.xml for dependency awareness
          POM_CONTENT=""
          [ -f "pom.xml" ] && POM_CONTENT=$(cat "pom.xml")
          echo "POM_CONTENT<<HEREDOC" >> $GITHUB_ENV
          echo "$POM_CONTENT"         >> $GITHUB_ENV
          echo "HEREDOC"              >> $GITHUB_ENV

      - name: Generate Spring Boot code via GitHub Models API
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, re, sys

          design_doc     = os.environ.get("DESIGN_DOC", "")
          instructions   = os.environ.get("INSTRUCTIONS", "")
          source_context = os.environ.get("SOURCE_CONTEXT", "")
          pom_content    = os.environ.get("POM_CONTENT", "")
          ticket_id      = os.environ.get("TICKET_ID", "")

          prompt = f"""You are a senior Java Spring Boot developer. Based on the approved technical design document, generate production-ready Spring Boot code.

## Project Conventions
{instructions}

## Existing pom.xml (for dependency awareness — do NOT add new dependencies unless essential)
{pom_content}

## Existing Codebase Context (follow these patterns exactly)
{source_context}

## Approved Technical Design Document
{design_doc}

## Output Instructions
Generate ALL required Java files. For each file output EXACTLY this format:

### FILE: src/main/java/com/example/[path]/[ClassName].java
```java
[complete file content]
```

### FILE: src/test/java/com/example/[path]/[ClassName]Test.java
```java
[complete test file content]
```

Rules:
- Match the exact package structure from the existing codebase
- Follow every naming convention from copilot-instructions.md
- Use existing base classes, interfaces, and utilities where applicable
- Include all imports
- Write complete, compilable code — no TODOs, no placeholders
- Include unit tests for service layer
- Include integration tests for controller layer using @WebMvcTest
- If DB migration is needed, output: ### FILE: src/main/resources/db/migration/V[timestamp]__[description].sql"""

          payload = {
            "model": "gpt-4o",
            "max_tokens": 8000,
            "messages": [{"role": "user", "content": prompt}]
          }

          req = urllib.request.Request(
            "https://models.inference.ai.azure.com/chat/completions",
            data=json.dumps(payload).encode(),
            headers={
              "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
              "Content-Type": "application/json"
            }
          )
          with urllib.request.urlopen(req) as resp:
            data = json.load(resp)

          if "choices" not in data:
            print("ERROR: " + json.dumps(data), file=sys.stderr)
            sys.exit(1)

          text = data["choices"][0]["message"]["content"]

          file_pattern = re.compile(
            r'### FILE: ([\w/.\-]+)\n```(?:java|sql|xml|yaml|yml|properties)?\n(.*?)```',
            re.DOTALL
          )

          files = file_pattern.findall(text)
          if not files:
            print("WARNING: No files parsed from response. Dumping raw response.")
            os.makedirs("generated", exist_ok=True)
            with open(f"generated/{ticket_id}-raw.md", "w") as f:
              f.write(text)
            sys.exit(0)

          for filepath, content in files:
            filepath = filepath.strip()
            os.makedirs(os.path.dirname(filepath) if os.path.dirname(filepath) else ".", exist_ok=True)
            with open(filepath, "w") as f:
              f.write(content.strip())
            print(f"Written: {filepath}")

          with open("/tmp/generated_files.txt", "w") as f:
            f.write("\n".join(fp.strip() for fp, _ in files))

          print(f"\nTotal files generated: {len(files)}")
          PYEOF

      - name: Commit generated code
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "feat(${TICKET_ID}): AI-generated implementation

          Generated from approved design doc: docs/design/${TICKET_ID}.md
          Pipeline: auto-dev-pipeline
          
          Co-authored-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push origin "$BRANCH_NAME"

      - name: Close design PR and open code review PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Comment on design PR that it's been approved and code is ready
          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" \
              --body "✅ Design approved. Code has been generated and a new PR is open for code review."
            gh pr close "$PR_NUMBER" || true
          fi

          # Collect generated file list for PR body
          GENERATED_FILES=""
          if [ -f /tmp/generated_files.txt ]; then
            GENERATED_FILES=$(cat /tmp/generated_files.txt | sed 's/^/- `/' | sed 's/$/`/')
          fi

          # Open code review PR
          CODE_PR_URL=$(gh pr create \
            --title "🚀 [Code Review] ${TICKET_ID}" \
            --body "## Code Review Required

          AI-generated Spring Boot implementation for **\`${TICKET_ID}\`**.

          📄 **Based on:** \`docs/design/${TICKET_ID}.md\`

          ### Generated Files
          ${GENERATED_FILES}

          ---

          ### 🔄 To request code changes:
          Leave a review comment — the pipeline will automatically iterate on the same PR.

          > Comment \`/revise-code: <feedback>\` for targeted AI revision.

          ---
          > Merge this PR once satisfied. This is a standard GitHub PR review." \
            --base main \
            --head "$BRANCH_NAME" \
            --label "code-review")

          echo "Code review PR opened: $CODE_PR_URL"