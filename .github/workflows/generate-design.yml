# =============================================================================
# Workflow 1: generate-design
# Triggered by: kickoff.sh via repository_dispatch
# What it does: Reads the MD requirement + copilot-instructions.md,
#               calls Claude API to produce a technical design doc,
#               commits it, and opens a PR for human review.
# =============================================================================
name: 1 · Generate Design Doc

on:
  repository_dispatch:
    types: [generate-design]

jobs:
  generate-design:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    env:
      TICKET_ID:   ${{ github.event.client_payload.ticket_id }}
      BRANCH_NAME: ${{ github.event.client_payload.branch_name }}
      MD_PATH:     ${{ github.event.client_payload.md_path }}
      BRANCH_TYPE: ${{ github.event.client_payload.branch_type }}

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}
          token: ${{ secrets.GH_PAT }}

      - name: Read requirement & instructions
        id: read_files
        run: |
          # Requirement MD
          REQUIREMENT=$(cat "$MD_PATH")
          echo "REQUIREMENT<<HEREDOC" >> $GITHUB_ENV
          echo "$REQUIREMENT"         >> $GITHUB_ENV
          echo "HEREDOC"              >> $GITHUB_ENV

          # Copilot instructions (code conventions)
          INSTRUCTIONS=""
          if [ -f ".github/copilot-instructions.md" ]; then
            INSTRUCTIONS=$(cat ".github/copilot-instructions.md")
          fi
          echo "INSTRUCTIONS<<HEREDOC" >> $GITHUB_ENV
          echo "$INSTRUCTIONS"         >> $GITHUB_ENV
          echo "HEREDOC"              >> $GITHUB_ENV

      - name: Generate design doc via GitHub Models API
        id: generate
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: python3 scripts/generate_design.py

      - name: Commit design doc to branch
        run: |
          DESIGN_PATH="docs/design/${TICKET_ID}.md"
          mkdir -p docs/design

          cp /tmp/design_doc.md "$DESIGN_PATH"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DESIGN_PATH"
          git commit -m "design: add technical design doc for ${TICKET_ID}"
          git push origin "$BRANCH_NAME"

          echo "DESIGN_PATH=$DESIGN_PATH" >> $GITHUB_ENV

      - name: Open Design Review PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          DESIGN_PATH="docs/design/${TICKET_ID}.md"

          # Ensure required labels exist before applying them
          for LABEL in "design-review" "design-approved" "code-review"; do
            gh label create "$LABEL" --color "#0075ca" --force || true
          done

          PR_URL=$(gh pr create \
            --title "🎨 [Design Review] ${TICKET_ID}" \
            --body "## Design Review Required

          The AI has generated a technical design document for **\`${TICKET_ID}\`** based on the requirements in \`${MD_PATH}\`.

          📄 **Design Doc:** \`${DESIGN_PATH}\`

          ---

          ### ✅ To approve and proceed to code generation:
          Comment: \`/approve-design\`

          ### 🔄 To request revisions:
          Comment: \`/revise-design: <your feedback here>\`

          ---
          > This PR was auto-generated by the auto-dev pipeline." \
            --base main \
            --head "$BRANCH_NAME" \
            --label "design-review")

          echo "Design PR opened: $PR_URL"