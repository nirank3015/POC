# =============================================================================
# One-time setup: enforce branch protection on main
# Triggered manually via workflow_dispatch
# Requires: GH_PAT with admin:repo scope
# =============================================================================
name: 0 · Setup Branch Protection

on:
  workflow_dispatch:

jobs:
  protect-main:
    runs-on: ubuntu-latest
    steps:
      - name: Require 1 human approval on main before merge
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          curl -sf -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/branches/main/protection" \
            -d '{
              "required_status_checks": null,
              "enforce_admins": false,
              "required_pull_request_reviews": {
                "required_approving_review_count": 1,
                "dismiss_stale_reviews": true
              },
              "restrictions": null
            }'
          echo "Branch protection applied to main — 1 approving review required."
